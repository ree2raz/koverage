apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: koverage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: koverage-platform:latest
          command: ["python", "-m", "beacon.worker.main"]
          envFrom:
            - secretRef:
                name: koverage-secrets
          env:
            - name: DATABASE_URL
              value: postgresql+psycopg://beacon:beacon@postgres:5432/beacon
            - name: REDPANDA_BROKERS
              value: redpanda:29092
