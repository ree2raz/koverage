# Create this from your .env before applying:
#   kubectl create secret generic koverage-secrets \
#     --from-literal=OPENROUTER_API_KEY=<your-key> \
#     --from-literal=INGEST_API_KEY=dev-ingest-key \
#     -n koverage --dry-run=client -o yaml > deploy/k8s/secrets.yaml
#
# The placeholder below is intentional — do not commit real keys.
apiVersion: v1
kind: Secret
metadata:
  name: koverage-secrets
  namespace: koverage
type: Opaque
stringData:
  OPENROUTER_API_KEY: "REPLACE_ME"
  INGEST_API_KEY: "dev-ingest-key"
  POSTGRES_PASSWORD: "beacon"
