apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: ollive
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ollive-web:latest
          ports:
            - containerPort: 5173
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: ollive
spec:
  selector:
    app: web
  type: NodePort
  ports:
    - port: 5173
      nodePort: 30173
