apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: koverage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      initContainers:
        - name: migrate
          image: koverage-platform:latest
          command: ["sh", "-c", "cd beacon && alembic upgrade head"]
          envFrom:
            - secretRef:
                name: koverage-secrets
          env:
            - name: DATABASE_URL
              value: postgresql+psycopg://beacon:beacon@postgres:5432/beacon
            - name: REDPANDA_BROKERS
              value: redpanda:29092
      containers:
        - name: gateway
          image: koverage-platform:latest
          command: ["uvicorn", "beacon.gateway.main:app", "--host", "0.0.0.0", "--port", "8000"]
          envFrom:
            - secretRef:
                name: koverage-secrets
          env:
            - name: DATABASE_URL
              value: postgresql+psycopg://beacon:beacon@postgres:5432/beacon
            - name: REDPANDA_BROKERS
              value: redpanda:29092
            - name: CORS_ORIGINS
              value: "http://localhost:5173"
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: koverage
spec:
  selector:
    app: gateway
  ports:
    - port: 8000
