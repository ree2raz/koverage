# Apply all manifests:
#   kubectl apply -k deploy/k8s/
#
# k3d quick-start:
#   k3d cluster create koverage --port "5173:30173@loadbalancer" --port "8000:30800@loadbalancer"
#   docker build -t koverage-platform:latest .
#   docker build -t koverage-web:latest -f web/Dockerfile .
#   k3d image import koverage-platform:latest koverage-web:latest -c koverage
#   kubectl apply -k deploy/k8s/

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: koverage

resources:
  - namespace.yaml
  - secrets.yaml
  - postgres.yaml
  - gateway.yaml
  - ingestion.yaml
  - worker.yaml
  - web.yaml
