# Ollive platform — one-command bring-up.
#
#   cp .env.example .env          # fill OPENROUTER_API_KEY
#   docker compose -f deploy/docker-compose.yml up --build
#
# env_file loads ../env (= platform/.env) directly into every app container
# so secrets never need to be exported to the shell first.
# Docker-internal hostnames (postgres, redpanda, ingestion) are set via
# `environment:` which takes precedence over env_file values.

name: ollive

services:
  # ── datastores ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: ../.env
    environment:
      POSTGRES_USER: beacon
      POSTGRES_PASSWORD: beacon
      POSTGRES_DB: beacon
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beacon -d beacon"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── event bus ────────────────────────────────────────────────────────────
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp=1
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --check=false
    ports:
      - "9092:9092"
      - "29092:29092"
      - "9644:9644"
    volumes:
      - rpdata:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 15

  redpanda-init:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        rpk topic create inference-events --brokers redpanda:29092 -p 3 -r 1 || true
        rpk topic create inference-events-dlq --brokers redpanda:29092 -p 1 -r 1 || true
        rpk topic list --brokers redpanda:29092
    restart: "no"

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.7.2
    restart: unless-stopped
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:29092
    ports:
      - "8080:8080"

  # ── one-shot: apply DB migrations ────────────────────────────────────────
  migrate:
    build:
      context: ..
      dockerfile: Dockerfile
    working_dir: /app/beacon
    command: alembic upgrade head
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://beacon:beacon@postgres:5432/beacon
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── application services ─────────────────────────────────────────────────
  gateway:
    build:
      context: ..
      dockerfile: Dockerfile
    command: uvicorn beacon.gateway.main:app --host 0.0.0.0 --port 8000
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://beacon:beacon@postgres:5432/beacon
      REDPANDA_BROKERS: redpanda:29092
      INGEST_URL: http://ingestion:8088/v1/ingest
      CORS_ORIGINS: "http://localhost:5173,http://web:5173"
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ingestion:
    build:
      context: ..
      dockerfile: Dockerfile
    command: uvicorn beacon.ingestion.main:app --host 0.0.0.0 --port 8088
    env_file: ../.env
    environment:
      REDPANDA_BROKERS: redpanda:29092
    ports:
      - "8088:8088"
    depends_on:
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8088/healthz')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    command: python -m beacon.worker.main
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://beacon:beacon@postgres:5432/beacon
      REDPANDA_BROKERS: redpanda:29092
    depends_on:
      migrate:
        condition: service_completed_successfully
      redpanda-init:
        condition: service_completed_successfully
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  rpdata:
