      support, has quit smoking, and has attended all required counseling sessions.  However, kidneys for transplant are scarce
      and there is a long waiting list. There is only a fixed time window to do the transplant after the kidney becomes available
      before it will no longer be viable. Given the positive indicators of the patient's commitment to his health and the close
      donor match, should this patient be prioritized to receive this kidney transplant?


